<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revision Timetable</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    p {
      text-align: center;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    iframe {
      width: 100%;
      height: 70vh;
      border: none;
      border-radius: 12px;
      background: white;
    }

    .buttons {
      display: flex;
      justify-content: center;
      margin-top: 15px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      background: #3b82f6;
      transition: 0.2s;
      font-weight: bold;
    }

    .btn:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .note {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.7;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📚 My Revision Timetable</h1>
    <p>Stay consistent. Stick to the plan. Smash your exams.</p>

    <iframe src="revision-timetable.pdf">
      <p>Your browser can’t display PDFs.
         <a href="revision-timetable.pdf">Download it here</a>.
      </p>
    </iframe>

    <div class="buttons">
      <a class="btn" href="revision-timetable.pdf" download>⬇ Download PDF</a>
      <a class="btn" href="revision-timetable.pdf" target="_blank">🔍 Open Full Screen</a>
    </div>

    <div class="note">
      Tip: Bookmark this page so you don’t lose your timetable.
    </div>
  </div>
</body>
</html>
